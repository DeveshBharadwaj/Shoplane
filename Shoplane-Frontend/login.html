<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPIFY - Login / Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .toggle-link { color: #0d6efd; cursor: pointer; text-decoration: underline; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="auth-container">
    <div id="login-box">
        <h3 class="text-center mb-4">Sign In</h3>
        <form id="login-form">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" id="login-email" class="form-control" required placeholder="name@example.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="login-password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
        </form>
        <p class="text-center mb-0">Don't have an account? <span class="toggle-link" onclick="toggleAuth()">Register here</span></p>
    </div>

    <div id="register-box" class="hidden">
        <h3 class="text-center mb-4">Create Account</h3>
        <form id="register-form">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" id="reg-name" class="form-control" required placeholder="Enter Your Name">
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" id="reg-email" class="form-control" required placeholder="Enter Your email id">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="reg-password" class="form-control" required placeholder="*%$$$%&***">
            </div>
            <button type="submit" class="btn btn-success w-100 mb-3">Register</button>
        </form>
        <p class="text-center mb-0">Already have an account? <span class="toggle-link" onclick="toggleAuth()">Login here</span></p>
    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
